{% extends "base.html" %}
{% block title %}Login — CodeForge{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4">
            <div class="text-center mb-4">
                <i class="bi bi-code-slash" style="font-size: 3rem; color: var(--accent);"></i>
                <h3 class="mt-2" style="font-family: 'Courier New', monospace;">CodeForge</h3>
                <p class="text-secondary">Online IDE</p>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-accent w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </form>
            <hr class="border-secondary">
            <p class="text-center mb-0">
                <small>Don't have an account? <a href="/register" style="color: var(--accent);">Register here</a></small>
            </p>
        </div>
    </div>
</div>
{% endblock %}
