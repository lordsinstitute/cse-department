{% extends 'base.html' %}
{% block title %}Login - Insurance Claim Predictor{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <h3 class="text-center mb-4"><i class="bi bi-shield-check"></i> Insurance Claim Predictor</h3>
            <h5 class="text-center text-muted mb-4">Login to your account</h5>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right"></i> Login</button>
            </form>
            <p class="text-center mt-3 mb-0">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
        </div>
    </div>
</div>
{% endblock %}
