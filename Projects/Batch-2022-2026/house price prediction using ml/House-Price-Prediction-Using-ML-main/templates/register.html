{% extends "base.html" %}
{% block title %}Register — House Price Prediction{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card glass-card p-4">
      <div class="text-center mb-4">
        <i class="bi bi-house-heart-fill text-accent" style="font-size: 2.5rem;"></i>
        <h2 class="mt-2">Create Account</h2>
      </div>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label"><i class="bi bi-person"></i> Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
        </div>
        <div class="mb-3">
          <label class="form-label"><i class="bi bi-person-badge"></i> Username</label>
          <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
        </div>
        <div class="mb-3">
          <label class="form-label"><i class="bi bi-lock"></i> Password</label>
          <input type="password" name="password" class="form-control" placeholder="Create a password" required minlength="4">
        </div>
        <button type="submit" class="btn btn-accent w-100 mb-3"><i class="bi bi-person-plus"></i> Register</button>
      </form>
      <div class="text-center">
        <span class="text-muted">Already have an account?</span> <a href="{{ url_for('login') }}" class="text-accent">Login here</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
