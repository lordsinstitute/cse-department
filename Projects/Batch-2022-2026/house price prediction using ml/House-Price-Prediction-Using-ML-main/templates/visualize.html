{% extends "base.html" %}
{% block title %}Visualizations — House Price Prediction{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-bar-chart text-accent"></i> EDA Visualizations</h2>

<div class="row g-3">
  {% for chart in charts %}
  <div class="col-md-6">
    <div class="card glass-card p-3">
      <h5 class="mb-1">{{ chart.title }}</h5>
      <small class="text-muted">{{ chart.desc }}</small>
      <img src="{{ url_for('static', filename='vis/' + chart.file) }}" class="img-fluid rounded mt-2" alt="{{ chart.title }}">
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
