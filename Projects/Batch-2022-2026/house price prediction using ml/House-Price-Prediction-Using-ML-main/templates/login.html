{% extends "base.html" %}
{% block title %}Login — House Price Prediction{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card glass-card p-4">
      <div class="text-center mb-4">
        <i class="bi bi-house-heart-fill text-accent" style="font-size: 3rem;"></i>
        <h2 class="mt-2">House Price Predictor</h2>
        <p class="text-muted">ML-Powered California Housing Price Prediction</p>
      </div>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label"><i class="bi bi-person"></i> Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="mb-3">
          <label class="form-label"><i class="bi bi-lock"></i> Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-accent w-100 mb-3"><i class="bi bi-box-arrow-in-right"></i> Login</button>
      </form>
      <div class="text-center">
        <span class="text-muted">Don't have an account?</span> <a href="{{ url_for('register') }}" class="text-accent">Register here</a>
      </div>
      <hr class="my-3">
      <div class="small text-muted">
        <strong>Demo Account:</strong> admin / admin123
      </div>
    </div>
  </div>
</div>
{% endblock %}
