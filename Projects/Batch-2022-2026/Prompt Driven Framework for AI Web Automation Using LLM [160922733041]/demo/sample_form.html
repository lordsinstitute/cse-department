<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form — Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f4f8;
            color: #1a202c;
            padding: 2rem;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #4a5568;
            font-size: 0.9rem;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea,
        select {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
            background: white;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #4299e1;
        }
        textarea { resize: vertical; min-height: 80px; }
        .radio-group {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.4rem;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-weight: 400;
            cursor: pointer;
        }
        .submit-btn {
            display: block;
            width: 100%;
            padding: 0.8rem;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1.5rem;
        }
        .submit-btn:hover { background: #3182ce; }
        .success-message {
            display: none;
            text-align: center;
            padding: 2rem;
            background: #f0fff4;
            border: 2px solid #68d391;
            border-radius: 12px;
            margin-top: 1.5rem;
        }
        .success-message h2 { color: #276749; margin-bottom: 1rem; }
        .success-message .data-summary {
            text-align: left;
            background: white;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #4a5568;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Job Application</h1>
        <p class="subtitle">TechCorp Inc. — Software Engineering Position</p>

        <form id="applicationForm" onsubmit="return handleSubmit(event)">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="full_name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567">
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="City, State, Country">
            </div>

            <div class="form-group">
                <label for="position">Position Applied For</label>
                <select id="position" name="position">
                    <option value="">Select a position</option>
                    <option value="frontend">Frontend Developer</option>
                    <option value="backend">Backend Developer</option>
                    <option value="fullstack">Full Stack Developer</option>
                    <option value="devops">DevOps Engineer</option>
                    <option value="data">Data Engineer</option>
                    <option value="ml">Machine Learning Engineer</option>
                </select>
            </div>

            <div class="form-group">
                <label for="experience">Years of Experience</label>
                <select id="experience" name="experience">
                    <option value="">Select experience</option>
                    <option value="0-1">0-1 years</option>
                    <option value="1-3">1-3 years</option>
                    <option value="3-5">3-5 years</option>
                    <option value="5-10">5-10 years</option>
                    <option value="10+">10+ years</option>
                </select>
            </div>

            <div class="form-group">
                <label for="education">Highest Education</label>
                <select id="education" name="education">
                    <option value="">Select education</option>
                    <option value="high_school">High School</option>
                    <option value="bachelors">Bachelor's Degree</option>
                    <option value="masters">Master's Degree</option>
                    <option value="phd">Ph.D.</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="university">University / Institution</label>
                <input type="text" id="university" name="university" placeholder="Name of your university">
            </div>

            <div class="form-group">
                <label for="skills">Skills</label>
                <textarea id="skills" name="skills" placeholder="List your key skills (e.g., Python, JavaScript, React, AWS...)"></textarea>
            </div>

            <div class="form-group">
                <label for="summary">Professional Summary</label>
                <textarea id="summary" name="summary" placeholder="Brief summary of your experience and goals"></textarea>
            </div>

            <div class="form-group">
                <label>Availability</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="availability" value="immediate"> Immediate
                    </label>
                    <label>
                        <input type="radio" name="availability" value="2weeks"> 2 Weeks
                    </label>
                    <label>
                        <input type="radio" name="availability" value="1month"> 1 Month
                    </label>
                    <label>
                        <input type="radio" name="availability" value="negotiable"> Negotiable
                    </label>
                </div>
            </div>

            <button type="submit" class="submit-btn">Submit Application</button>
        </form>

        <div id="successMessage" class="success-message">
            <h2>Application Submitted Successfully!</h2>
            <p style="color: #4a5568; margin-bottom: 1rem;">Thank you for your application. Here's what we received:</p>
            <div id="dataSummary" class="data-summary"></div>
        </div>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            const form = document.getElementById('applicationForm');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            // Show success
            form.style.display = 'none';
            const successDiv = document.getElementById('successMessage');
            successDiv.style.display = 'block';

            const summary = document.getElementById('dataSummary');
            let html = '';
            for (const [key, value] of Object.entries(data)) {
                if (value) {
                    const label = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                    html += `<p><strong>${label}:</strong> ${value}</p>`;
                }
            }
            summary.innerHTML = html;

            return false;
        }
    </script>
</body>
</html>
