{% extends "base.html" %}
{% block title %}Sign In — AI Web Automation{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-robot fs-1 text-accent"></i>
                    <h4 class="mt-2 fw-bold"><span class="text-accent">AI</span> Web Automation</h4>
                    <p class="text-secondary mb-0">Sign in to continue</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label" for="username">USERNAME</label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="Enter username" autofocus required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="password">PASSWORD</label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-accent btn-lg w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Sign In
                    </button>
                </form>
            </div>
        </div>
        <p class="text-center text-secondary mt-3" style="font-size: 0.8rem;">
            Default credentials: <code>admin</code> / <code>admin123</code>
        </p>
    </div>
</div>
{% endblock %}
