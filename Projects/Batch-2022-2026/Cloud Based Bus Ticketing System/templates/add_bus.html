{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-7">
        <h2 class="text-center mb-4">Add New Bus</h2>
        <div class="card p-4">
            <form method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Bus Number</label>
                        <input type="text" name="bus_number" class="form-control" required placeholder="e.g., AP-11-1234">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Bus Name</label>
                        <input type="text" name="bus_name" class="form-control" required placeholder="e.g., Star Express">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Bus Type</label>
                    <select name="bus_type" class="form-select" required>
                        <option value="AC Seater">AC Seater</option>
                        <option value="AC Sleeper">AC Sleeper</option>
                        <option value="Non-AC Seater">Non-AC Seater</option>
                        <option value="Non-AC Sleeper">Non-AC Sleeper</option>
                        <option value="Volvo AC">Volvo AC</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Source</label>
                        <input type="text" name="source" class="form-control" required placeholder="e.g., Hyderabad">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Destination</label>
                        <input type="text" name="destination" class="form-control" required placeholder="e.g., Mumbai">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Departure Time</label>
                        <input type="time" name="departure_time" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Arrival Time</label>
                        <input type="time" name="arrival_time" class="form-control" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Total Seats</label>
                        <input type="number" name="total_seats" class="form-control" required min="1" placeholder="e.g., 40">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fare (Rs.)</label>
                        <input type="number" name="fare" class="form-control" required min="1" step="0.01" placeholder="e.g., 850">
                    </div>
                </div>
                <button type="submit" class="btn btn-book w-100">Add Bus</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
