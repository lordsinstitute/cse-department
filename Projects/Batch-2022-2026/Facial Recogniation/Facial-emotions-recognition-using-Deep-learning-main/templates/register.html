{% extends "base.html" %}
{% block title %}Register — EmotionAI{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <i class="fas fa-brain fa-3x" style="color: var(--violet);"></i>
            <h2 class="mt-3 fw-bold">Create Account</h2>
            <p class="text-secondary">Join the Facial Emotion Recognition platform</p>
        </div>

        <div class="card glow-border">
            <div class="card-header text-center">
                <i class="fas fa-user-plus me-2"></i>Register New Account
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-user me-1"></i> Full Name</label>
                        <input type="text" class="form-control" name="name" required autofocus
                               placeholder="Enter your full name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-at me-1"></i> Username</label>
                        <input type="text" class="form-control" name="username" required
                               placeholder="Choose a username">
                    </div>
                    <div class="mb-4">
                        <label class="form-label"><i class="fas fa-lock me-1"></i> Password</label>
                        <input type="password" class="form-control" name="password" required
                               placeholder="Minimum 4 characters" minlength="4">
                    </div>
                    <button type="submit" class="btn btn-violet w-100">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                </form>
            </div>
            <div class="card-footer text-center py-3">
                <span class="text-secondary">Already have an account?</span>
                <a href="{{ url_for('login') }}" class="ms-1" style="color: var(--violet-light);">Login here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
