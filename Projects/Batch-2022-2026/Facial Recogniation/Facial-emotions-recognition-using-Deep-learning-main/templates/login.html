{% extends "base.html" %}
{% block title %}Login — EmotionAI{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <i class="fas fa-brain fa-3x" style="color: var(--violet);"></i>
            <h2 class="mt-3 fw-bold">EmotionAI</h2>
            <p class="text-secondary">Facial Emotion Recognition System</p>
        </div>

        <div class="card glow-border">
            <div class="card-header text-center">
                <i class="fas fa-sign-in-alt me-2"></i>Login to Your Account
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-user me-1"></i> Username</label>
                        <input type="text" class="form-control" name="username" required autofocus
                               placeholder="Enter your username">
                    </div>
                    <div class="mb-4">
                        <label class="form-label"><i class="fas fa-lock me-1"></i> Password</label>
                        <input type="password" class="form-control" name="password" required
                               placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn btn-violet w-100">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>
            </div>
            <div class="card-footer text-center py-3">
                <span class="text-secondary">Don't have an account?</span>
                <a href="{{ url_for('register') }}" class="ms-1" style="color: var(--violet-light);">Register here</a>
            </div>
        </div>

        <div class="text-center mt-3">
            <small class="text-secondary">
                <i class="fas fa-info-circle me-1"></i>
                Default: admin / admin123
            </small>
        </div>
    </div>
</div>
{% endblock %}
