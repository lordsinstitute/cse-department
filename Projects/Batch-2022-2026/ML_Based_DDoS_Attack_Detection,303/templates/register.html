{% extends 'base.html' %}
{% block title %}Register - DDoS Detection{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h3 class="text-center mb-4"><i class="bi bi-person-plus text-primary"></i> Register</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Choose a password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-person-plus"></i> Create Account
                </button>
            </form>
            <hr class="my-3" style="border-color: rgba(255,255,255,0.1);">
            <p class="text-center text-secondary mb-0">
                Already have an account? <a href="{{ url_for('login') }}" class="text-primary">Login here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
