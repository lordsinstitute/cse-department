{% extends 'base.html' %}
{% block title %}Login - DDoS Detection{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h3 class="text-center mb-4"><i class="bi bi-box-arrow-in-right text-primary"></i> Login</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </form>
            <hr class="my-3" style="border-color: rgba(255,255,255,0.1);">
            <p class="text-center text-secondary mb-0">
                Don't have an account? <a href="{{ url_for('register') }}" class="text-primary">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
