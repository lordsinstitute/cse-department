{% extends "base.html" %}
{% block title %}Register — CodeForge{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus" style="font-size: 3rem; color: var(--accent);"></i>
                <h3 class="mt-2">Create Account</h3>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required minlength="4">
                </div>
                <button type="submit" class="btn btn-accent w-100">
                    <i class="bi bi-person-plus"></i> Register
                </button>
            </form>
            <hr class="border-secondary">
            <p class="text-center mb-0">
                <small>Already have an account? <a href="/login" style="color: var(--accent);">Login here</a></small>
            </p>
        </div>
    </div>
</div>
{% endblock %}
