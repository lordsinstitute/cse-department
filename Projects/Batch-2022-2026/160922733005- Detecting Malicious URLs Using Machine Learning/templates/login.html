{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-0"><i class="bi bi-shield-lock-fill text-warning me-2"></i>URLShield Login</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" required autofocus
                               placeholder="Enter username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required
                               placeholder="Enter password">
                    </div>
                    <button type="submit" class="btn btn-warning w-100"><i class="bi bi-box-arrow-in-right me-2"></i>Login</button>
                </form>
                <p class="text-center mt-3 mb-0 text-muted">
                    Don't have an account? <a href="{{ url_for('register') }}" class="text-warning">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
