{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-0"><i class="bi bi-person-plus-fill text-warning me-2"></i>Create Account</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" name="name" required placeholder="John Doe">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" required placeholder="johndoe">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required placeholder="Create a password">
                    </div>
                    <button type="submit" class="btn btn-warning w-100"><i class="bi bi-person-plus me-2"></i>Register</button>
                </form>
                <p class="text-center mt-3 mb-0 text-muted">
                    Already have an account? <a href="{{ url_for('login') }}" class="text-warning">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
