{% extends "base.html" %}
{% block title %}Add Patient{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-person-plus"></i> Add New Patient
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Patient Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" placeholder="Full name" required>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label">Age</label>
                            <input type="number" name="age" class="form-control" placeholder="Years" min="1" max="120">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Gender</label>
                            <select name="gender" class="form-select">
                                <option value="">— Select —</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Clinical Notes</label>
                        <textarea name="notes" class="form-control" rows="3"
                            placeholder="e.g., history of injury, symptoms, medications..."></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-scan flex-fill">
                            <i class="bi bi-person-check"></i> Save Patient
                        </button>
                        <a href="{{ url_for('patients') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
