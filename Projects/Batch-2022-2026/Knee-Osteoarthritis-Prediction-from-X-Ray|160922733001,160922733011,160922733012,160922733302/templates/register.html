{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header text-center">
                <h4 class="mb-0"><i class="bi bi-bandaid text-teal"></i> Knee OA Classification</h4>
                <small class="text-muted">Create Your Account</small>
            </div>
            <div class="card-body p-4">
                <h5 class="mb-3"><i class="bi bi-person-plus"></i> Register</h5>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" name="name" required placeholder="Enter your full name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" name="username" required placeholder="Choose a username">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required placeholder="Choose a password">
                    </div>
                    <button type="submit" class="btn btn-scan w-100 mb-3">
                        <i class="bi bi-person-plus"></i> Register
                    </button>
                </form>
                <p class="text-center text-muted mb-0">
                    Already have an account? <a href="{{ url_for('login') }}">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
