{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <h3 class="text-center mb-4"><i class="bi bi-person-plus"></i> Register</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required minlength="4">
                </div>
                <button type="submit" class="btn btn-scan w-100">Register</button>
            </form>
            <p class="text-center mt-3 mb-0">
                <small>Already have an account? <a href="/login" class="text-info">Login here</a></small>
            </p>
        </div>
    </div>
</div>
{% endblock %}
