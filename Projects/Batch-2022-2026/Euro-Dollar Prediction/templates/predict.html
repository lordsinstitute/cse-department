{% extends "base.html" %}
{% block content %}

<div class="container-fluid">

    <!-- Page Header -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4">
        <div>
            <h3 class="fw-bold mb-1">Predict Closing Price</h3>
            <p class="text-muted mb-0">Enter technical indicators to forecast EUR/USD closing price</p>
        </div>
    </div>

    <!-- Prediction Form Card -->
    <div class="card shadow-sm p-4 rounded-4">
        <form method="POST" class="mt-3">

            <div class="mb-3">
                <label class="form-label fw-semibold">Close Price</label>
                <input type="number" step="0.0001" name="close" class="form-control form-control-lg" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">SMA 20</label>
                <input type="number" step="0.0001" name="sma" class="form-control form-control-lg" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">EMA 20</label>
                <input type="number" step="0.0001" name="ema" class="form-control form-control-lg" required>
            </div>

            <button type="submit" class="btn btn-primary btn-lg shadow-sm">Predict</button>

        </form>

        {% if prediction %}
        <div class="alert alert-success mt-4 shadow-sm rounded-3">
            <strong>Predicted Closing Price:</strong> {{ prediction }}
        </div>
        {% endif %}
    </div>

</div>

{% endblock %}
