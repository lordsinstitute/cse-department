services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models/final_model:/app/models/final_model
    env_file:
      - .env
    runtime: nvidia

  frontend:
    build:
      context: ./frontend  # Docker looks inside the 'frontend' folder
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend