<!DOCTYPE html>
<html>
<head>

<title>Twitter Spam Detection (Agentic AI)</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container mt-5">

<h2>Twitter Spam Detection using Agentic AI</h2>

<form action="/predict" method="post">

<textarea name="tweet" class="form-control mb-3"
placeholder="Enter tweet text"></textarea>

<input type="number" name="followers"
placeholder="Followers" class="form-control mb-2">

<input type="number" name="following"
placeholder="Following" class="form-control mb-2">

<input type="number" name="actions"
placeholder="Actions" class="form-control mb-3">

<button class="btn btn-primary">Analyze</button>

</form>

{% if result %}

<hr>

<h4>Agent Results</h4>

<pre>{{ result }}</pre>

{% endif %}

</div>

</body>
</html>
